<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Njarin - En maintenance</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: #120C0B; /* Afro-Night Background */
            color: #F5E6E3;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 2.5rem;
            max-width: 400px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 88px;
            height: 88px;
            margin-bottom: 1.5rem;
            border-radius: 22px;
            border: 1px solid rgba(212, 163, 115, 0.2);
            box-shadow: 0 0 30px rgba(212, 163, 115, 0.08);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: rgba(212, 163, 115, 0.1);
            border: 1px solid rgba(212, 163, 115, 0.25);
            border-radius: 100px;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 500;
            color: #D4A373;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 1.2rem;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #D4A373;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.8rem 0;
            color: #D4A373;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1rem;
            font-weight: 300;
            color: rgba(245, 230, 227, 0.55);
            line-height: 1.6;
            margin: 0 0 2rem 0;
            max-width: 300px;
        }

        .divider {
            width: 36px;
            height: 1px;
            background: rgba(212, 163, 115, 0.2);
            margin-bottom: 1.8rem;
        }

        .loader {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 9px;
            height: 9px;
            background-color: #D4A373;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 11px;
            font-weight: 300;
            color: rgba(245, 230, 227, 0.18);
            letter-spacing: 0.04em;
        }


    </style>
</head>
<body>
    <div class="container">
        <img src="icon.png" alt="Njarin Logo" class="logo">

        <div class="badge">
            <div class="badge-dot"></div>
            Maintenance en cours
        </div>

        <h1>Njarin</h1>
        <p>Nous améliorons l'expérience pour vous. La plateforme sera disponible très bientôt.</p>

        <div class="divider"></div>

        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="footer">njarin.sn</div>
    </div>
</body>
</html>
