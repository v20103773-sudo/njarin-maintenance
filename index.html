<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Njarin - En maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: #120C0B; /* Afro-Night Background */
            color: #F5E6E3;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 2.5rem;
            max-width: 400px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
            border-radius: 18px; /* Smooth rounded corners for the icon */
            box-shadow: 0 4px 15px rgba(212, 163, 115, 0.1);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 0.8rem 0;
            color: #D4A373; /* Afro-Night Primary */
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(245, 230, 227, 0.6); /* Afro-Night Text Secondary */
            line-height: 1.5;
            margin: 0 0 2rem 0;
        }

        .loader {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: #D4A373;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo from the project root -->
        <img src="icon.png" alt="Njarin Logo" class="logo">
        
        <p>Njarin est en cours de maintenance.</p>
        
        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</body>
</html>
